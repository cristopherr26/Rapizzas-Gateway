spring:
  application:
    name: rapizzas-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                  - "https://front-end-rapizzas.vercel.app"
                allowedMethods:
                  - "*"
                allowedHeaders:
                  - "*"
                allowCredentials: true
          routes:
            - id: rapizzas-employee
              uri: https://rapizzas-ing-soft-ii.onrender.com
              predicates:
                - Path=/api/rapizzas/employee/**
            - id: rapizzas-id-type
              uri: https://rapizzas-ing-soft-ii.onrender.com
              predicates:
                - Path=/api/rapizzas/id-type,/api/rapizzas/id-type/
            - id: rapizzas-role
              uri: https://rapizzas-ing-soft-ii.onrender.com
              predicates:
                - Path=/api/rapizzas/role/**
            - id: rapizzas-pizzeria
              uri: https://rapizzas-ing-soft-ii.onrender.com
              predicates:
                - Path=/api/rapizzas/pizzeria/**
            - id: rapizzas-auth
              uri: https://rapizzas-ing-soft-ii.onrender.com
              predicates:
                - Path=/api/rapizzas/auth/**

server:
  port: 2345

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info
  endpoint:
    gateway:
      access: unrestricted